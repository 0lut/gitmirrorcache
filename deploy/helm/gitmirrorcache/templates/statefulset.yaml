apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gitmirrorcache.fullname" . }}
  labels:
    {{- include "gitmirrorcache.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "gitmirrorcache.fullname" . }}
  selector:
    matchLabels:
      {{- include "gitmirrorcache.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.configFile }}
        checksum/config: {{ .Values.configFile | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "gitmirrorcache.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gitmirrorcache.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: git-cache-api
          image: {{ include "gitmirrorcache.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ (split ":" .Values.config.bindAddr)._1 | int }}
              protocol: TCP
          env:
            {{- include "gitmirrorcache.env" (dict "ctx" .) | nindent 12 }}
            {{- if .Values.configFile }}
            - name: GIT_CACHE_CONFIG
              value: /etc/gitmirrorcache/config.toml
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: {{ .Values.config.cacheRoot }}
            {{- if .Values.configFile }}
            - name: config
              mountPath: /etc/gitmirrorcache
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.configFile }}
        - name: config
          configMap:
            name: {{ include "gitmirrorcache.fullname" . }}
        {{- end }}
        {{- if not .Values.persistence.enabled }}
        - name: cache
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: cache
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
