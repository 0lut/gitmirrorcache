bind_addr = "0.0.0.0:8080"
cache_root = "/cache"
git_binary = "git"
git_timeout_seconds = 120
max_git_output_bytes = 16777216
upstream_auth_token_env = "GITHUB_TOKEN"
rate_limit_per_minute = 120
allowed_upstream_hosts = ["github.com"]
max_concurrent_git_processes = 64

[object_store]
kind = "s3"
bucket = "git-cache"
# Runtime appends the v2 schema suffix, so this stores under repos-v2.
prefix = "repos"
endpoint = "https://s3.amazonaws.com"

[disk]
quota_bytes = 1099511627776
min_free_bytes = 107374182400

[compaction]
chain_depth_threshold = 10
inline = false

# Graceful shutdown: after SIGTERM the server fails /healthz readiness for
# readiness_delay_seconds, then drains in-flight requests for up to
# drain_timeout_seconds before exiting.
[shutdown]
readiness_delay_seconds = 5
drain_timeout_seconds = 60
