bind_addr = "127.0.0.1:8080"
public_base_url = "http://127.0.0.1:8080"
cache_root = "./cache"
upstream_root = "./tmp/upstreams"
git_binary = "git"
git_timeout_seconds = 120
max_git_output_bytes = 16777216
rate_limit_per_minute = 120
allowed_upstream_hosts = ["github.com"]
max_concurrent_git_processes = 64
max_concurrent_generation_verifications = 1

[object_store]
kind = "s3"
bucket = "gitmirrorcache-test"
# Runtime appends the v2 schema suffix, so this stores under local-v2.
prefix = "local"
endpoint = "http://127.0.0.1:9000"

[disk]
quota_bytes = 10737418240
min_free_bytes = 1073741824

[git_remote]
enabled = true
branch_ref_check = "always"
commit_read_through = true

[compaction]
chain_depth_threshold = 10
inline = false
