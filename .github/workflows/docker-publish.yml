name: Publish Release Artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_DIR: deploy/helm/gitmirrorcache
  CHART_REPOSITORY: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  build:
    name: Build & push (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docker-publish-${{ matrix.arch }}

      - name: Build release binaries
        run: |
          cargo build --release --features s3 -p git-cache-api -p git-cache-cli
          mkdir -p dist
          cp target/release/git-cache-api target/release/git-cache dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & push manifest list
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `latest` is added automatically for non-prerelease semver tags
          # (flavor latest=auto), so v1.0.0-rc1 never moves `latest`.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          tag_args=()
          while IFS= read -r tag; do
            tag_args+=("-t" "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          shopt -s nullglob
          sources=()
          for digest_path in ./*; do
            digest="${digest_path#./}"
            sources+=("${REGISTRY}/${IMAGE_NAME}@sha256:${digest}")
          done
          if [ "${#sources[@]}" -eq 0 ]; then
            echo "no image digests found"
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

      - name: Inspect manifest list
        run: docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${{ steps.meta.outputs.version }}"

  publish-helm-chart:
    name: Package & push Helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: merge
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Extract release metadata
        id: release
        run: |
          version="${GITHUB_REF_NAME#v}"
          chart_name="$(helm show chart "${CHART_DIR}" | awk '$1 == "name:" { print $2; exit }')"
          if [ -z "${chart_name}" ]; then
            echo "chart name is missing from ${CHART_DIR}/Chart.yaml"
            exit 1
          fi
          {
            echo "version=${version}"
            echo "chart_name=${chart_name}"
            echo "chart_package=dist/${chart_name}-${version}.tgz"
          } >> "$GITHUB_OUTPUT"

      - name: Lint chart
        run: helm lint "${CHART_DIR}" --set config.objectStore.s3.bucket=ci-bucket

      - name: Package chart
        run: |
          helm package "${CHART_DIR}" \
            --destination dist \
            --version "${{ steps.release.outputs.version }}" \
            --app-version "${{ steps.release.outputs.version }}"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: helm push "${{ steps.release.outputs.chart_package }}" "oci://${CHART_REPOSITORY}"
