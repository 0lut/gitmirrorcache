name: Preview Stack

on:
  workflow_dispatch:
    inputs:
      action:
        description: Deploy or destroy a preview stack.
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - destroy
      ref:
        description: Branch, tag, or commit to deploy. Defaults to the workflow ref.
        required: false
        default: ""
        type: string
      version_id:
        description: Existing preview version to destroy when the ref no longer exists.
        required: false
        default: ""
        type: string
      delete_data:
        description: Delete the preview S3 cache prefix during destroy.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: preview-stack-${{ github.event.inputs.version_id || github.event.inputs.ref || github.ref_name }}-${{ github.event.inputs.action }}
  cancel-in-progress: false

jobs:
  preview-stack:
    name: ${{ github.event.inputs.action }} preview stack
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      PREVIEW_SHARED_NAME_PREFIX: ${{ vars.PREVIEW_SHARED_NAME_PREFIX || 'gitmirrorcache-arm' }}
      PREVIEW_SHARED_ALB: ${{ vars.PREVIEW_SHARED_ALB || 'true' }}
      PREVIEW_ALB_NAME: ${{ vars.GIT_CACHE_PREVIEW_ALB_NAME }}
      PREVIEW_S3_BUCKET: ${{ vars.GIT_CACHE_PREVIEW_S3_BUCKET }}
      PREVIEW_ECR_REPOSITORY: ${{ vars.GIT_CACHE_PREVIEW_ECR_REPOSITORY }}
      GITHUB_TOKEN_SECRET_ARN: ${{ secrets.GIT_CACHE_GITHUB_TOKEN_SECRET_ARN }}
    steps:
      - name: Check out deployment tooling
        uses: actions/checkout@v4
        with:
          path: tooling
          fetch-depth: 0

      - name: Check out target source
        if: ${{ github.event.inputs.action == 'deploy' || github.event.inputs.version_id == '' }}
        uses: actions/checkout@v4
        with:
          path: source
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Resolve preview ref
        run: |
          if [[ -n "${{ github.event.inputs.ref }}" ]]; then
            echo "REF=${{ github.event.inputs.ref }}" >> "$GITHUB_ENV"
          else
            echo "REF=HEAD" >> "$GITHUB_ENV"
          fi
          if [[ -d "$GITHUB_WORKSPACE/source/.git" ]]; then
            echo "REPO_ROOT=$GITHUB_WORKSPACE/source" >> "$GITHUB_ENV"
          else
            echo "REPO_ROOT=$GITHUB_WORKSPACE/tooling" >> "$GITHUB_ENV"
          fi

      - name: Deploy preview
        if: ${{ github.event.inputs.action == 'deploy' }}
        run: "$GITHUB_WORKSPACE/tooling/scripts/aws/deploy-preview.sh"

      - name: Destroy preview
        if: ${{ github.event.inputs.action == 'destroy' }}
        env:
          DELETE_DATA: ${{ github.event.inputs.delete_data }}
          VERSION_ID: ${{ github.event.inputs.version_id }}
        run: "$GITHUB_WORKSPACE/tooling/scripts/aws/destroy-preview.sh"
