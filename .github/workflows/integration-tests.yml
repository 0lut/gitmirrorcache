name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-
            ${{ runner.os }}-cargo-

      - name: Run integration tests
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt"
            if timeout 120 cargo test --workspace --test '*' 2>&1; then
              echo "::endgroup::"
              echo "Tests passed on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::Attempt $attempt failed, retrying..."
              sleep 2
            fi
          done
          echo "::error::Tests failed after 3 attempts"
          exit 1

  minio-integration-tests:
    name: MinIO Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      CARGO_TERM_COLOR: always
      GIT_CACHE_S3_INTEGRATION: "1"
      GIT_CACHE_S3_ENDPOINT: http://127.0.0.1:9000
      GIT_CACHE_S3_BUCKET: gitmirrorcache-test
      GIT_CACHE_S3_ACCESS_KEY: minioadmin
      GIT_CACHE_S3_SECRET_KEY: minioadmin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-minio-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-minio-
            ${{ runner.os }}-cargo-

      - name: Start MinIO
        run: docker compose -f docker-compose.minio.yml up -d --wait

      - name: Run MinIO object-store tests
        run: cargo test -p git-cache-objectstore --features s3 minio_

      - name: Run MinIO materializer tests
        run: cargo test -p git-cache-domain --features s3-tests minio_
