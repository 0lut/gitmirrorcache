name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-unit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-unit-
            ${{ runner.os }}-cargo-

      - name: Run unit tests
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt"
            if timeout 120 cargo test --workspace --lib 2>&1; then
              echo "::endgroup::"
              echo "Tests passed on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::Attempt $attempt failed, retrying..."
              sleep 2
            fi
          done
          echo "::error::Tests failed after 3 attempts"
          exit 1
